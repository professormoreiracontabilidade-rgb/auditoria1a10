<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Auditoria</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(180deg,#061b35,#0b2e5f);
  color:#102033;
}

.app{
  max-width:430px;
  margin:auto;
  min-height:100vh;
  padding:14px;
}

.header{
  color:white;
  text-align:center;
  background:linear-gradient(135deg,#003b8f,#0066ff);
  border-radius:24px;
  padding:20px 14px;
  margin-bottom:12px;
}

.header h1{
  margin:0 0 6px;
  font-size:23px;
}

.header p{
  margin:0;
  font-size:13px;
}

.score{
  background:white;
  border-radius:16px;
  padding:10px;
  text-align:center;
  font-weight:bold;
  color:#003b8f;
  margin-bottom:10px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-bottom:12px;
}

.grid button{
  border:0;
  border-radius:12px;
  padding:10px 0;
  background:#dce7ff;
  color:#003b8f;
  font-weight:bold;
  cursor:pointer;
}

.grid button.active{
  background:#003b8f;
  color:white;
}

.grid button.correct{
  background:#00a86b;
  color:white;
}

.grid button.wrong{
  background:#d93025;
  color:white;
}

.card{
  background:white;
  border-radius:22px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,.22);
}

.meta{
  font-size:12px;
  color:#41536b;
  background:#edf4ff;
  border-radius:12px;
  padding:9px;
  margin-bottom:12px;
  line-height:1.45;
}

.qnum{
  display:inline-block;
  background:#003b8f;
  color:white;
  border-radius:999px;
  padding:7px 12px;
  font-weight:bold;
  margin-bottom:10px;
}

.question{
  font-size:15px;
  line-height:1.55;
  margin:8px 0 12px;
}

.options{
  display:grid;
  gap:8px;
  margin-top:12px;
}

.option{
  border:1px solid #d8e1ef;
  border-radius:12px;
  padding:11px;
  background:#f6f8fb;
  font-size:14px;
  line-height:1.4;
  cursor:pointer;
}

.option:hover{
  background:#eaf2ff;
}

.option.selected{
  border:2px solid #003b8f;
  background:#eaf2ff;
}

.option.correct{
  background:#dff6e9;
  border:2px solid #00a86b;
}

.option.wrong{
  background:#fde2e0;
  border:2px solid #d93025;
}

.feedback{
  display:none;
  margin-top:14px;
  padding:13px;
  border-radius:14px;
  font-size:14px;
  line-height:1.5;
}

.feedback.show{
  display:block;
}

.feedback.correct{
  background:#dff6e9;
  border:1px solid #00a86b;
}

.feedback.wrong{
  background:#fde2e0;
  border:1px solid #d93025;
}

.nav{
  display:flex;
  gap:10px;
  margin-top:14px;
}

.nav button{
  flex:1;
  border:0;
  border-radius:14px;
  padding:13px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
}

.prev{
  background:#dce7ff;
  color:#003b8f;
}

.next{
  background:#00a86b;
  color:white;
}

.footer{
  text-align:center;
  color:white;
  font-size:12px;
  padding:18px 4px 28px;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <h1>📘 Quiz de Auditoria</h1>
    <p>NBC TA 230 – Documentação de Auditoria</p>
  </div>

  <div class="score" id="score">Acertos: 0 | Erros: 0</div>

  <div class="grid" id="grid"></div>

  <div class="card">
    <div class="meta" id="meta"></div>
    <div class="qnum" id="qnum"></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>

    <div class="nav">
      <button class="prev" onclick="prevQuestion()">← Voltar</button>
      <button class="next" onclick="nextQuestion()">Próxima →</button>
    </div>
  </div>

  <div class="footer">
    Curso de Contabilidade Professor Moreira
  </div>

</div>

<script>
const questions = [
{
meta:"FGV - ACE (TCE RR)/TCE RR/Ciências Atuariais/2025",
q:"Sobre a documentação de auditoria, considere as afirmativas: I. Deve incluir uma estratégia de auditoria e um plano de auditoria. II. Deve ser suficientemente detalhada para permitir a um auditor experiente entender a natureza, a época, o escopo e os resultados dos procedimentos executados. III. Deve registrar os procedimentos executados e a evidência obtida e apoiar a comunicação dos resultados da auditoria. Está correto o que se afirma em:",
options:["I, II e III.","II e III, apenas.","I, apenas.","I e III, apenas.","II, apenas."],
answer:0,
comment:"Todas estão corretas. A documentação deve registrar planejamento, procedimentos, evidências e conclusões."
},
{
meta:"FGV - ACE (TCE RR)/TCE RR/Controle Externo/2025",
q:"Quanto à documentação de auditoria, analise: I. Registro dos procedimentos executados, da evidência relevante obtida e conclusões alcançadas. II. Deve permitir que auditor experiente entenda natureza, época e extensão dos procedimentos, resultados e assuntos significativos. III. Deve registrar características que identificam os itens ou assuntos específicos testados. Está correto o que se afirma em:",
options:["I, apenas.","I e II, apenas.","II e III, apenas.","I e III, apenas.","I, II e III."],
answer:4,
comment:"As três afirmativas estão corretas conforme a NBC TA 230."
},
{
meta:"FGV - CNAI (CFC)/CFC/QTG/2025",
q:"De acordo com a NBC TA 230, é correto afirmar que:",
options:[
"Após a montagem do arquivo final, o auditor deve apagar e descartar a documentação.",
"Se não atender a requisito específico, deve abster-se de emitir opinião.",
"Se executar procedimentos novos após a data do relatório, deve recomeçar o trabalho do início.",
"Se identificar informação significativa inconsistente com sua conclusão final, deve documentar como tratou essa inconsistência.",
"Deve completar o arquivo final antes da data do relatório."
],
answer:3,
comment:"O auditor deve documentar como tratou inconsistências relevantes com sua conclusão final."
},
{
meta:"FGV - Ana GM (Pref SJC)/Pref SJC/Ciências Contábeis/2025",
q:"Corresponde à documentação de auditoria o registro dos seguintes itens: I. Procedimentos de auditoria executados. II. Evidência de auditoria relevante obtida. III. Conclusões alcançadas pelo auditor. Está correto o que se apresenta em:",
options:["I, apenas.","I e II, apenas.","I e III, apenas.","II e III, apenas.","I, II e III."],
answer:4,
comment:"Documentação de auditoria é o registro dos procedimentos executados, da evidência relevante obtida e das conclusões alcançadas."
},
{
meta:"FGV - CNAI (CFC)/CFC/QTG/2025",
q:"Avalie se são documentos de auditoria: I. Programas de auditoria. II. Explicações verbais. III. Memorandos de assuntos do trabalho. IV. Cartas de confirmação e representação. São documentos de auditoria:",
options:["I e II, apenas.","III e IV, apenas.","I, II e III, apenas.","I, III e IV, apenas.","I, II, III e IV."],
answer:3,
comment:"Explicações verbais, por si só, não representam documentação adequada. Programas, memorandos e cartas são documentos."
},
{
meta:"FGV - CNAI (CFC)/CFC/QTG/2025",
q:"Com base na NBC TA 300, avalie: I. O planejamento deve considerar materialidade e riscos de distorção relevante. II. O auditor deve revisar continuamente a estratégia global e o plano. III. Não há exigência de atualização em caso de mudanças significativas. IV. A estratégia global deve abordar supervisão da equipe. Está correto o que se afirma em:",
options:["I e III, apenas.","III e IV, apenas.","I, II e IV, apenas.","II, III e IV, apenas.","I, II, III e IV."],
answer:2,
comment:"A III está errada. Mudanças significativas devem ser refletidas e documentadas."
},
{
meta:"FGV - Ana GM (Pref SJC)/Pref SJC/Ciências Contábeis/2024",
q:"As alternativas representam documentação de auditoria adequada, com exceção de uma. Assinale-a.",
options:[
"Análises.",
"Explicações verbais do auditor.",
"Resumos de assuntos significativos.",
"Memorandos de assuntos do trabalho.",
"Correspondência eletrônica referente a assuntos significativos."
],
answer:1,
comment:"Explicações verbais podem esclarecer documentos, mas isoladamente não são documentação adequada."
},
{
meta:"FGV - Cons Leg (CM SP)/CM SP/Contador/2024",
q:"Considerando a NBC TA 230, assinale a afirmativa correta.",
options:[
"Não se exige documentação de informações significativas inconsistentes com a conclusão final.",
"O auditor pode deixar de atender a requisito relevante desde que documente os procedimentos alternativos executados para cumprir a finalidade desse requisito.",
"Após a data do relatório, o auditor não poderá executar procedimentos novos ou adicionais.",
"A documentação da auditoria compreende uma ou mais pastas ou formas de armazenamento.",
"É vedado modificar ou acrescentar documentação após a montagem do arquivo final."
],
answer:1,
comment:"Em circunstâncias excepcionais, procedimentos alternativos podem cumprir a finalidade do requisito, desde que documentados."
},
{
meta:"FGV - Cons Leg (CM SP)/CM SP/Contador/2024",
q:"Avalie: I. Explicações verbais do auditor, por si só, representam documentação adequada. II. O ceticismo profissional pode não ser passível de documentação, mas a documentação pode fornecer evidências do seu exercício. III. As normas não exigem documentação das decisões profissionais significativas. Está correto o que se afirma em:",
options:["II e III, apenas.","I, II e III.","III, apenas.","II, apenas.","I e III, apenas."],
answer:3,
comment:"Somente a II está correta. Explicações verbais isoladas não bastam e julgamentos significativos devem ser documentados."
},
{
meta:"FGV - ACP (CGE PB)/CGE PB/Auditoria Governamental/2024",
q:"Planilha, gráficos e tabelas sumarizadas preparados para auxiliar na definição dos procedimentos seguintes possuem natureza:",
options:["Analítica.","Eventual.","Conclusiva.","Fiscalizatória.","Comprobatória."],
answer:0,
comment:"Planilhas, gráficos e tabelas usados para análise e definição de procedimentos possuem natureza analítica."
}
];

let current = 0;
let userAnswers = Array(questions.length).fill(null);

function renderGrid(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  questions.forEach((q,i)=>{
    const btn = document.createElement("button");
    btn.textContent = i+1;

    if(i === current) btn.classList.add("active");

    if(userAnswers[i] !== null){
      if(userAnswers[i] === q.answer){
        btn.classList.add("correct");
      }else{
        btn.classList.add("wrong");
      }
    }

    btn.onclick = () => {
      current = i;
      renderQuestion();
    };

    grid.appendChild(btn);
  });
}

function renderQuestion(){
  const q = questions[current];

  document.getElementById("meta").textContent = q.meta;
  document.getElementById("qnum").textContent = "Questão " + (current+1);
  document.getElementById("question").textContent = q.q;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach((op,i)=>{
    const div = document.createElement("div");
    div.className = "option";
    div.textContent = String.fromCharCode(97+i) + ") " + op;

    if(userAnswers[current] !== null){
      if(i === q.answer) div.classList.add("correct");
      if(i === userAnswers[current] && i !== q.answer) div.classList.add("wrong");
    }

    div.onclick = () => selectAnswer(i);
    optionsDiv.appendChild(div);
  });

  showFeedback();
  renderGrid();
  updateScore();
}

function selectAnswer(i){
  userAnswers[current] = i;
  renderQuestion();
}

function showFeedback(){
  const fb = document.getElementById("feedback");
  const q = questions[current];

  if(userAnswers[current] === null){
    fb.className = "feedback";
    fb.innerHTML = "";
    return;
  }

  if(userAnswers[current] === q.answer){
    fb.className = "feedback show correct";
    fb.innerHTML = "<b>✅ Você acertou!</b><br>" + q.comment;
  }else{
    fb.className = "feedback show wrong";
    fb.innerHTML = "<b>❌ Você errou.</b><br>Resposta correta: <b>" +
    String.fromCharCode(97+q.answer) + ") " + q.options[q.answer] +
    "</b><br>" + q.comment;
  }
}

function updateScore(){
  let acertos = 0;
  let erros = 0;

  userAnswers.forEach((ans,i)=>{
    if(ans !== null){
      if(ans === questions[i].answer) acertos++;
      else erros++;
    }
  });

  document.getElementById("score").textContent =
  "Acertos: " + acertos + " | Erros: " + erros;
}

function nextQuestion(){
  if(current < questions.length-1){
    current++;
    renderQuestion();
  }
}

function prevQuestion(){
  if(current > 0){
    current--;
    renderQuestion();
  }
}

renderQuestion();
</script>

</body>
</html>
