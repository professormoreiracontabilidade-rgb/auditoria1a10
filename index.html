<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz de Auditoria</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(180deg, #061a3a 0%, #082b66 48%, #0b3f91 100%);
  color: #102033;
}

.app {
  width: 100%;
  max-width: 430px;
  min-height: 100vh;
  margin: 0 auto;
  padding: 14px;
}

.header {
  background: linear-gradient(135deg, #031633, #0646a8, #0b64e6);
  color: white;
  border-radius: 26px;
  padding: 20px 16px;
  text-align: center;
  box-shadow: 0 12px 28px rgba(0,0,0,.25);
  margin-bottom: 14px;
}

.header h1 {
  margin: 0;
  font-size: 24px;
  letter-spacing: .3px;
}

.scoreboard {
  margin-top: 12px;
  background: rgba(255,255,255,.16);
  border: 1px solid rgba(255,255,255,.25);
  border-radius: 18px;
  padding: 10px;
  font-weight: bold;
  font-size: 15px;
}

.timer {
  margin-top: 10px;
  background: #ffffff;
  color: #083575;
  display: inline-block;
  padding: 8px 14px;
  border-radius: 999px;
  font-weight: bold;
  box-shadow: 0 4px 12px rgba(0,0,0,.15);
}

.print-panel {
  background: #ffffff;
  border-radius: 22px;
  padding: 12px;
  margin: 14px 0;
  box-shadow: 0 10px 22px rgba(0,0,0,.20);
}

.print-title {
  color: #06357e;
  font-weight: bold;
  text-align: center;
  margin-bottom: 10px;
  font-size: 14px;
}

.print-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.print-actions button {
  border: 0;
  border-radius: 16px;
  padding: 12px 8px;
  font-weight: bold;
  font-size: 13px;
  color: white;
  background: linear-gradient(135deg, #7f1d1d, #991b1b);
  box-shadow: 0 6px 14px rgba(127, 29, 29, .35);
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  margin: 14px 0;
}

.qbtn {
  border: 0;
  border-radius: 14px;
  padding: 11px 0;
  font-weight: bold;
  color: white;
  background: #31527c;
  box-shadow: 0 6px 14px rgba(0,0,0,.18);
  cursor: pointer;
}

.qbtn.current {
  background: #0b64e6;
  outline: 3px solid rgba(255,255,255,.7);
}

.qbtn.correct {
  background: #16a34a;
}

.qbtn.wrong {
  background: #dc2626;
}

.card {
  background: #ffffff;
  border-radius: 26px;
  padding: 18px;
  box-shadow: 0 14px 30px rgba(0,0,0,.24);
  margin-bottom: 14px;
}

.meta {
  font-size: 13px;
  color: #0b4fb5;
  font-weight: bold;
  background: #eef5ff;
  border-radius: 14px;
  padding: 10px;
  margin-bottom: 14px;
}

.question {
  font-size: 16px;
  line-height: 1.52;
}

.question p {
  margin: 10px 0;
}

.item {
  background: #eef7ff;
  border-left: 5px solid #0b64e6;
  border-radius: 14px;
  padding: 12px;
  margin: 10px 0;
  line-height: 1.45;
}

.options {
  display: grid;
  gap: 10px;
  margin-top: 16px;
}

.option {
  width: 100%;
  text-align: left;
  border: 2px solid #d8e7ff;
  background: #f8fbff;
  color: #102033;
  border-radius: 16px;
  padding: 13px;
  font-size: 15px;
  cursor: pointer;
  transition: .2s;
}

.option:hover {
  transform: translateY(-1px);
  border-color: #0b64e6;
}

.option.correct {
  background: #dcfce7;
  border-color: #16a34a;
  color: #14532d;
  font-weight: bold;
}

.option.wrong {
  background: #fee2e2;
  border-color: #dc2626;
  color: #7f1d1d;
  font-weight: bold;
}

.feedback {
  display: none;
  margin-top: 16px;
  padding: 14px;
  border-radius: 18px;
  line-height: 1.5;
}

.feedback.show {
  display: block;
}

.feedback.ok {
  background: #dcfce7;
  border-left: 6px solid #16a34a;
}

.feedback.bad {
  background: #fee2e2;
  border-left: 6px solid #dc2626;
}

.comment {
  margin-top: 12px;
  background: #f1f7ff;
  border-left: 6px solid #0b64e6;
  padding: 14px;
  border-radius: 16px;
  line-height: 1.55;
}

.nav {
  display: flex;
  gap: 10px;
  margin: 14px 0 18px;
}

.nav button {
  flex: 1;
  border: 0;
  border-radius: 18px;
  padding: 14px 10px;
  font-size: 15px;
  font-weight: bold;
  color: #ffffff;
  background: linear-gradient(135deg, #5b0b0b, #7f1d1d, #991b1b);
  box-shadow: 0 8px 18px rgba(127, 29, 29, .35);
  cursor: pointer;
  border: 1px solid rgba(255,255,255,.35);
}

.nav button:disabled {
  opacity: .45;
  cursor: not-allowed;
}

.footer {
  text-align: center;
  color: white;
  font-size: 13px;
  padding: 22px 10px 28px;
  opacity: .98;
  background: linear-gradient(135deg,#031633,#0b64e6);
  border-radius: 24px;
  box-shadow: 0 10px 24px rgba(0,0,0,.25);
  margin-top: 18px;
}

.small {
  font-size: 13px;
  opacity: .9;
}

.print-area {
  display: none;
}

@media print {
  body {
    background: white !important;
    color: black;
  }

  .app {
    display: none !important;
  }

  .print-area {
    display: block !important;
    padding: 0;
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
  }

  .print-header {
    text-align: center;
    border-bottom: 3px solid #0b3f91;
    padding-bottom: 10px;
    margin-bottom: 18px;
  }

  .print-header h1 {
    font-size: 20px;
    color: #0b3f91;
    margin: 0 0 6px 0;
  }

  .print-header p {
    margin: 3px 0;
    font-size: 12px;
  }

  .print-question {
    page-break-inside: avoid;
    border: 1px solid #d7e5ff;
    border-left: 5px solid #0b64e6;
    border-radius: 12px;
    padding: 12px;
    margin: 0 0 14px 0;
  }

  .print-meta {
    font-size: 11px;
    font-weight: bold;
    color: #0b3f91;
    margin-bottom: 8px;
  }

  .print-question p {
    margin: 7px 0;
    line-height: 1.35;
  }

  .print-question .item {
    background: #eef7ff !important;
    border-left: 4px solid #0b64e6;
    padding: 8px;
    margin: 6px 0;
    border-radius: 8px;
  }

  .print-options {
    margin-top: 8px;
  }

  .print-options div {
    margin: 5px 0;
    font-size: 13px;
  }

  .answer-box {
    margin-top: 10px;
    padding: 9px;
    background: #eef7ff !important;
    border-radius: 8px;
    border-left: 4px solid #16a34a;
    font-size: 13px;
    line-height: 1.35;
  }

  .page-footer {
    text-align: center;
    font-size: 11px;
    margin-top: 20px;
    color: #0b3f91;
    font-weight: bold;
  }
}
</style>
</head>

<body>
<div class="app">
  <div class="header">
    <h1>📘 Quiz de Auditoria</h1>
    <div class="scoreboard" id="scoreboard">Acertos: 0 | Erros: 0</div>
    <div class="timer">⏱️ Tempo: <span id="timer">00:00</span></div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="card">
    <div class="meta" id="meta"></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="nav">
    <button id="prevBtn" onclick="prevQuestion()">← Voltar</button>
    <button id="nextBtn" onclick="nextQuestion()">Próxima →</button>
  </div>

  <div class="print-panel">
    <div class="print-title">📄 Gerar material para impressão em PDF</div>
    <div class="print-actions">
      <button onclick="printPDF(true)">✅ PDF com respostas</button>
      <button onclick="printPDF(false)">📝 PDF sem respostas</button>
    </div>
  </div>

  <div class="footer">
    <div style="font-size:18px;font-weight:bold;letter-spacing:.4px;margin-bottom:6px;">
      📘 CURSO DE CONTABILIDADE PROFESSOR MOREIRA
    </div>
    <div style="font-size:15px;font-weight:bold;background:rgba(255,255,255,.18);display:inline-block;padding:8px 14px;border-radius:999px;">
      📱 WhatsApp: (61) 98532-3574
    </div>
  </div>
</div>

<div class="print-area" id="printArea"></div>

<script>
const questions = [
  {
    "meta": "FGV - ACE (TCE RR)/TCE RR/Ciências Atuariais/2025",
    "html": "\n<p><strong>Sobre a documentação de auditoria, considere as afirmativas a seguir:</strong></p>\n<div class=\"item\">I. Deve incluir uma estratégia de auditoria e um plano de auditoria.</div>\n<div class=\"item\">II. Deve ser suficientemente detalhada para permitir a um auditor experiente, sem nenhum conhecimento prévio da auditoria, entender a natureza, a época, o escopo e os resultados dos procedimentos executados.</div>\n<div class=\"item\">III. Deve registrar os procedimentos executados e a evidência obtida e apoiar a comunicação dos resultados da auditoria.</div>\n<p><strong>Está correto o que se afirma em:</strong></p>\n",
    "options": [
      "I, II e III.",
      "II e III, apenas.",
      "I, apenas.",
      "I e III, apenas.",
      "II, apenas."
    ],
    "answer": 0,
    "comment": "A alternativa correta é a letra A. A NBC TA 230 trata da documentação de auditoria e exige que o auditor prepare documentação suficiente e apropriada para comprovar a base de sua conclusão e demonstrar que a auditoria foi planejada e executada de acordo com as normas. A afirmativa I está correta porque a documentação deve abranger aspectos do planejamento, incluindo estratégia global e plano de auditoria, que evidenciam como o trabalho foi organizado. A afirmativa II também está correta, pois a documentação deve permitir que um auditor experiente, sem envolvimento anterior no trabalho, compreenda a natureza, a época, o escopo e os resultados dos procedimentos executados. A afirmativa III está correta porque os papéis de trabalho registram os procedimentos aplicados, as evidências obtidas e servem de suporte para as conclusões e comunicações do auditor. Portanto, todas as afirmativas estão corretas."
  },
  {
    "meta": "FGV - ACE (TCE RR)/TCE RR/Controle Externo/2025",
    "html": "\n<p>A documentação dos trabalhos de auditoria é fundamental para garantir a transparência, a qualidade e a rastreabilidade do processo de auditoria. Ela serve como comprovação do trabalho realizado, demonstrando que a auditoria foi conduzida de acordo com as normas aplicáveis e os procedimentos planejados, além de permitir revisões internas e externas.</p>\n<p><strong>Quanto à documentação de auditoria, analise as afirmações a seguir.</strong></p>\n<div class=\"item\">I. Trata-se do registro dos procedimentos de auditoria executados, da evidência de auditoria relevante obtida e conclusões alcançadas pelo auditor, usualmente também chamada de “papéis de trabalho”.</div>\n<div class=\"item\">II. O auditor deve preparar documentação de auditoria suficiente para permitir que um auditor experiente, sem nenhum envolvimento anterior com a auditoria, entenda a natureza, época e extensão dos procedimentos de auditoria, os resultados dos procedimentos executados e os assuntos significativos identificados durante a auditoria.</div>\n<div class=\"item\">III. Ao documentar a natureza, a época e a extensão dos procedimentos de auditoria executados, o auditor deve registrar as características que identificam os itens ou assuntos específicos testados.</div>\n<p><strong>Está correto o que se afirma em:</strong></p>\n",
    "options": [
      "I, apenas.",
      "I e II, apenas.",
      "II e III, apenas.",
      "I e III, apenas.",
      "I, II e III."
    ],
    "answer": 4,
    "comment": "A alternativa correta é a letra E. A afirmativa I corresponde exatamente ao conceito de documentação de auditoria na NBC TA 230: registro dos procedimentos executados, da evidência relevante obtida e das conclusões alcançadas. A afirmativa II também está correta, pois a norma exige que a documentação seja suficiente para que um auditor experiente, sem envolvimento anterior, compreenda o que foi feito, quando foi feito, qual foi a extensão dos procedimentos, quais resultados foram obtidos e quais assuntos relevantes foram identificados. A afirmativa III está correta porque, ao registrar os procedimentos, o auditor deve identificar os itens ou assuntos específicos testados, permitindo rastreabilidade e revisão posterior. Logo, as três afirmações refletem exigências normativas."
  },
  {
    "meta": "FGV - CNAI (CFC)/CFC/QTG/2025",
    "html": "\n<p><strong>De acordo com a NBC TA 230 (R1) – Documentação de Auditoria, é correto afirmar que:</strong></p>\n",
    "options": [
      "assim que a montagem do arquivo final de auditoria for completada, o auditor deve apagar e descartar a documentação de auditoria.",
      "se o auditor julgar necessário indicar que não houve atendimento de um requisito específico de uma norma, ele deve abster-se de emitir uma opinião em seu relatório.",
      "se o auditor executar procedimentos novos ou adicionais ou chegar a outras conclusões após a data do relatório, deve recomeçar o seu trabalho do início.",
      "se o auditor identificar informações referentes a um assunto significativo que são inconsistentes com a sua conclusão final, ele deve documentar como tratou essa inconsistência.",
      "o auditor deve montar a documentação em arquivo de auditoria e completar o processo administrativo de montagem do arquivo final de auditoria antes da data do relatório do auditor."
    ],
    "answer": 3,
    "comment": "A alternativa correta é a letra D. A NBC TA 230 determina que, se o auditor identificar informações referentes a assunto significativo que sejam inconsistentes com sua conclusão final, ele deve documentar como tratou essa inconsistência. Isso é importante porque a documentação precisa demonstrar a lógica do julgamento profissional e a forma como o auditor resolveu contradições relevantes. A letra A está errada porque a documentação não deve ser simplesmente apagada ou descartada após a montagem do arquivo final; ela deve ser mantida pelo prazo aplicável. A letra B está errada porque nem toda não aplicação de requisito leva automaticamente à abstenção de opinião; a norma trata da documentação de como o auditor alcançou o objetivo do requisito por procedimentos alternativos, quando aplicável. A letra C está errada porque procedimentos adicionais após a data do relatório não exigem recomeçar toda a auditoria. A letra E está errada porque a montagem final do arquivo ocorre após a data do relatório, dentro do prazo administrativo apropriado."
  },
  {
    "meta": "FGV - Ana GM (Pref SJC)/Pref SJC/Ciências Contábeis/2025",
    "html": "\n<p><strong>Em relação à documentação de auditoria, ou papéis de trabalho, avalie se, de acordo com a NBC TA 230 (R1), corresponde à documentação de auditoria o registro dos seguintes itens:</strong></p>\n<div class=\"item\">I. Procedimentos de auditoria executados.</div>\n<div class=\"item\">II. Evidência de auditoria relevante obtida.</div>\n<div class=\"item\">III. Conclusões alcançadas pelo auditor.</div>\n<p><strong>Está correto o que se apresenta em:</strong></p>\n",
    "options": [
      "I, apenas.",
      "I e II, apenas.",
      "I e III, apenas.",
      "II e III, apenas.",
      "I, II e III."
    ],
    "answer": 4,
    "comment": "A alternativa correta é a letra E. A questão cobra o conceito central de documentação de auditoria. Segundo a NBC TA 230, documentação de auditoria é o registro dos procedimentos executados, das evidências relevantes obtidas e das conclusões alcançadas pelo auditor. Portanto, o item I está correto porque os procedimentos precisam ser registrados para demonstrar o trabalho realizado. O item II está correto porque as evidências relevantes dão suporte às conclusões. O item III está correto porque a documentação também deve evidenciar o raciocínio e as conclusões do auditor. Assim, os três itens fazem parte da documentação de auditoria."
  },
  {
    "meta": "FGV - CNAI (CFC)/CFC/QTG/2025",
    "html": "\n<p>A NBC TA 230 (R1) dispõe sobre a documentação de auditoria, na qual discute-se a documentação dos procedimentos de auditoria executados e da evidência de auditoria obtida em relação à forma, conteúdo e extensão da documentação de auditoria. A documentação de auditoria pode ser registrada em papel, em formatos eletrônicos ou outros.</p>\n<p><strong>À luz da referida norma, avalie se os seguintes itens são documentos de auditoria:</strong></p>\n<div class=\"item\">I. Programas de auditoria.</div>\n<div class=\"item\">II. Explicações verbais.</div>\n<div class=\"item\">III. Memorandos de assuntos do trabalho.</div>\n<div class=\"item\">IV. Cartas de confirmação e representação.</div>\n<p><strong>São documentos de auditoria:</strong></p>\n",
    "options": [
      "I e II, apenas.",
      "III e IV, apenas.",
      "I, II e III, apenas.",
      "I, III e IV, apenas.",
      "I, II, III e IV."
    ],
    "answer": 3,
    "comment": "A alternativa correta é a letra D. Programas de auditoria, memorandos de assuntos do trabalho, cartas de confirmação e cartas de representação são exemplos de documentação de auditoria. Esses documentos podem demonstrar o planejamento, os procedimentos executados, evidências obtidas, comunicações relevantes e conclusões. O ponto de atenção está no item II: explicações verbais, isoladamente, não representam documentação de auditoria adequada para o trabalho executado ou para as conclusões obtidas. Elas podem até ajudar a explicar ou esclarecer informações já contidas nos papéis de trabalho, mas não substituem a documentação formal. Por isso, estão corretos apenas os itens I, III e IV."
  },
  {
    "meta": "FGV - CNAI (CFC)/CFC/QTG/2025",
    "html": "\n<p>O planejamento da auditoria é uma etapa relevante para garantir a qualidade e a eficiência do trabalho do auditor independente, permitindo que o auditor direcione seus esforços para as áreas mais relevantes, aumentando a probabilidade de detecção de distorções materiais e assegurando o cumprimento das normas profissionais.</p>\n<p><strong>Com base na NBC TA 300 (R1), acerca do planejamento da auditoria, avalie as afirmativas a seguir.</strong></p>\n<div class=\"item\">I. O planejamento da auditoria deve incluir a consideração da materialidade e dos fatores que possam afetar os riscos de distorção relevante, permitindo que o auditor desenvolva respostas apropriadas.</div>\n<div class=\"item\">II. O auditor deve revisar continuamente a estratégia global e o plano de auditoria ao longo do trabalho, podendo modificar a abordagem inicial conforme novas informações sejam obtidas.</div>\n<div class=\"item\">III. O planejamento da auditoria deve ser documentado, sem haver exigência normativa para que ele seja atualizado caso ocorram mudanças significativas no risco identificado.</div>\n<div class=\"item\">IV. A estratégia global da auditoria deve abordar a supervisão dos membros da equipe, garantindo que as responsabilidades sejam claramente definidas e compatíveis com a experiência de cada auditor.</div>\n<p><strong>Está correto o que se afirma em:</strong></p>\n",
    "options": [
      "I e III, apenas.",
      "III e IV, apenas.",
      "I, II e IV, apenas.",
      "II, III e IV, apenas.",
      "I, II, III e IV."
    ],
    "answer": 2,
    "comment": "A alternativa correta é a letra C. O item I está correto porque o planejamento deve considerar materialidade, riscos de distorção relevante e respostas apropriadas a esses riscos. O item II também está correto, pois o planejamento não é uma etapa congelada: a estratégia global e o plano de auditoria podem e devem ser revisados durante o trabalho quando surgirem novas informações ou mudanças nas circunstâncias. O item III está errado, pois mudanças significativas no risco identificado podem exigir atualização do planejamento e da documentação. Não basta documentar uma vez e ignorar alterações relevantes. O item IV está correto porque a estratégia global envolve aspectos como direção, supervisão e revisão do trabalho da equipe, considerando a experiência dos membros. Assim, estão corretos I, II e IV."
  },
  {
    "meta": "FGV - Ana GM (Pref SJC)/Pref SJC/Ciências Contábeis/2024",
    "html": "\n<p><strong>Na auditoria das demonstrações contábeis, as alternativas a seguir representam documentação de auditoria adequada para o trabalho executado pelo auditor ou para as conclusões obtidas, com exceção de uma. Assinale-a.</strong></p>\n",
    "options": [
      "análises.",
      "explicações verbais do auditor.",
      "resumos de assuntos significativos.",
      "memorandos de assuntos do trabalho.",
      "correspondência eletrônica referente a assuntos significativos."
    ],
    "answer": 1,
    "comment": "A alternativa correta é a letra B, pois a questão pede a exceção. A NBC TA 230 admite diversas formas de documentação de auditoria, como análises, resumos de assuntos significativos, memorandos, correspondências relevantes, programas de auditoria, cartas de confirmação e outros registros. No entanto, explicações verbais do auditor, por si só, não constituem documentação adequada para o trabalho executado nem para as conclusões alcançadas. Elas podem ser usadas para explicar ou esclarecer informações já registradas na documentação, mas não substituem os papéis de trabalho. Assim, a única alternativa que não representa documentação adequada, isoladamente, é “explicações verbais do auditor”."
  },
  {
    "meta": "FGV - Cons Leg (CM SP)/CM SP/Contador/2024",
    "html": "\n<p>Os papéis de trabalho são os documentos que têm por finalidade o registro das informações e fatos verificados durante a auditoria e que servem de suporte para conclusões, ações e recomendações.</p>\n<p><strong>Considerando as orientações da NBC TA 230 sobre a documentação de auditoria, assinale a afirmativa correta.</strong></p>\n",
    "options": [
      "Não se exige a documentação de informações referentes a assuntos significativos inconsistentes com a conclusão final do auditor.",
      "O auditor pode deixar de atender a um requisito relevante de uma norma de auditoria desde que documente os procedimentos alternativos executados para cumprir a finalidade desse requisito.",
      "Após a data do relatório, o auditor não poderá executar procedimentos novos ou adicionais que possam alterar a sua conclusão.",
      "A documentação da auditoria compreende uma ou mais pastas ou outras formas de armazenamento, em forma física ou eletrônica que contêm os registros que constituem a documentação de trabalho específico.",
      "É vedado ao profissional de auditoria modificar a documentação existente ou acrescentar novas documentações de auditoria após a montagem do respectivo arquivo final."
    ],
    "answer": 1,

let current = 0;
let answers = Array(questions.length).fill(null);
let elapsed = Array(questions.length).fill(0);
let timerInterval = null;
let currentStart = Date.now();

function formatTime(seconds) {
  const m = String(Math.floor(seconds / 60)).padStart(2, '0');
  const s = String(seconds % 60).padStart(2, '0');
  return `${m}:${s}`;
}

function startTimer() {
  clearInterval(timerInterval);
  currentStart = Date.now();
  timerInterval = setInterval(() => {
    const total = elapsed[current] + Math.floor((Date.now() - currentStart) / 1000);
    document.getElementById("timer").textContent = formatTime(total);
  }, 300);
}

function saveTime() {
  elapsed[current] += Math.floor((Date.now() - currentStart) / 1000);
  currentStart = Date.now();
}

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  questions.forEach((q, i) => {
    const b = document.createElement("button");
    b.className = "qbtn";
    b.textContent = i + 1;
    if (i === current) b.classList.add("current");
    if (answers[i] !== null) {
      if (answers[i] === q.answer) b.classList.add("correct");
      else b.classList.add("wrong");
    }
    b.onclick = () => goToQuestion(i);
    grid.appendChild(b);
  });
}

function updateScore() {
  let correct = 0;
  let wrong = 0;
  answers.forEach((a, i) => {
    if (a !== null) {
      if (a === questions[i].answer) correct++;
      else wrong++;
    }
  });
  document.getElementById("scoreboard").textContent = `Acertos: ${correct} | Erros: ${wrong}`;
}

function renderQuestion() {
  const q = questions[current];
  document.getElementById("meta").textContent = q.meta;
  document.getElementById("question").innerHTML = q.html;

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach((op, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.innerHTML = `<strong>${String.fromCharCode(97 + i)})</strong> ${op}`;
    btn.onclick = () => answerQuestion(i);

    if (answers[current] !== null) {
      btn.disabled = true;
      if (i === q.answer) btn.classList.add("correct");
      if (i === answers[current] && i !== q.answer) btn.classList.add("wrong");
    }

    optionsDiv.appendChild(btn);
  });

  renderFeedback();
  renderGrid();
  updateScore();

  document.getElementById("prevBtn").disabled = current === 0;
  document.getElementById("nextBtn").disabled = current === questions.length - 1;

  document.getElementById("timer").textContent = formatTime(elapsed[current]);
  startTimer();
}

function answerQuestion(index) {
  if (answers[current] !== null) return;
  saveTime();
  answers[current] = index;
  renderQuestion();
}

function renderFeedback() {
  const fb = document.getElementById("feedback");
  const q = questions[current];
  fb.className = "feedback";
  fb.innerHTML = "";

  if (answers[current] === null) return;

  const isCorrect = answers[current] === q.answer;
  fb.classList.add("show");
  fb.classList.add(isCorrect ? "ok" : "bad");

  let html = isCorrect
    ? `<strong>✅ Você acertou!</strong><br>`
    : `<strong>❌ Você errou.</strong><br><span class="small">Resposta correta: <strong>${String.fromCharCode(97 + q.answer)}) ${q.options[q.answer]}</strong></span>`;

  html += `<div class="comment"><strong>Comentário:</strong><br>${q.comment}</div>`;
  fb.innerHTML = html;
}

function goToQuestion(i) {
  saveTime();
  current = i;
  renderQuestion();
}

function nextQuestion() {
  if (current < questions.length - 1) {
    saveTime();
    current++;
    renderQuestion();
  }
}

function prevQuestion() {
  if (current > 0) {
    saveTime();
    current--;
    renderQuestion();
  }
}

function printPDF(withAnswers) {
  saveTime();

  let html = `
    <div class="print-header">
      <h1>📘 Quiz de Auditoria</h1>
      <p><strong>Curso de Contabilidade Professor Moreira</strong></p>
      <p><strong>WhatsApp: (61) 98532-3574</strong></p>
      <p>${withAnswers ? "Material com respostas e comentários" : "Material sem respostas"}</p>
    </div>
  `;

  questions.forEach((q, index) => {
    html += `
      <div class="print-question">
        <div class="print-meta">Questão ${index + 1} — ${q.meta}</div>
        <div>${q.html}</div>
        <div class="print-options">
    `;

    q.options.forEach((op, i) => {
      html += `<div><strong>${String.fromCharCode(97 + i)})</strong> ${op}</div>`;
    });

    if (withAnswers) {
      html += `
        </div>
        <div class="answer-box">
          <strong>Gabarito:</strong> ${String.fromCharCode(97 + q.answer).toUpperCase()} — ${q.options[q.answer]}<br><br>
          <strong>Comentário:</strong> ${q.comment}
        </div>
      `;
    } else {
      html += `</div>`;
    }

    html += `</div>`;
  });

  html += `<div class="page-footer">Curso de Contabilidade Professor Moreira • WhatsApp: (61) 98532-3574</div>`;

  document.getElementById("printArea").innerHTML = html;
  setTimeout(() => window.print(), 200);
}

window.addEventListener("beforeunload", saveTime);
renderQuestion();
</script>
