<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Auditoria</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:linear-gradient(180deg,#061b35,#0b2e5f);
  color:#102033;
}

.app{
  max-width:430px;
  margin:auto;
  min-height:100vh;
  padding:14px;
}

.header{
  color:white;
  text-align:center;
  background:linear-gradient(135deg,#003b8f,#0066ff);
  border-radius:24px;
  padding:20px 14px;
  margin-bottom:12px;
}

.header h1{
  margin:0 0 6px;
  font-size:24px;
}

.header p{
  margin:0;
  font-size:13px;
}

.score{
  background:white;
  border-radius:16px;
  padding:10px;
  text-align:center;
  font-weight:bold;
  color:#003b8f;
  margin-bottom:12px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-bottom:12px;
}

.grid button{
  border:0;
  border-radius:12px;
  padding:10px 0;
  background:#dce7ff;
  color:#003b8f;
  font-weight:bold;
  cursor:pointer;
}

.grid button.active{
  background:#003b8f;
  color:white;
}

.grid button.correct{
  background:#00a86b;
  color:white;
}

.grid button.wrong{
  background:#d93025;
  color:white;
}

.card{
  background:white;
  border-radius:22px;
  padding:18px;
  box-shadow:0 6px 18px rgba(0,0,0,.22);
}

.meta{
  font-size:12px;
  color:#41536b;
  background:#edf4ff;
  border-radius:12px;
  padding:9px;
  margin-bottom:12px;
  line-height:1.45;
}

.qnum{
  display:inline-block;
  background:#003b8f;
  color:white;
  border-radius:999px;
  padding:7px 12px;
  font-weight:bold;
  margin-bottom:14px;
}

.question{
  font-size:15px;
  line-height:1.7;
}

.roman{
  background:#f7faff;
  border-left:4px solid #0066ff;
  border-radius:10px;
  padding:12px;
  margin:10px 0;
  font-size:14px;
  line-height:1.6;
}

.options{
  display:grid;
  gap:8px;
  margin-top:16px;
}

.option{
  border:1px solid #d8e1ef;
  border-radius:12px;
  padding:12px;
  background:#f6f8fb;
  font-size:14px;
  line-height:1.5;
  cursor:pointer;
}

.option:hover{
  background:#eaf2ff;
}

.option.correct{
  background:#dff6e9;
  border:2px solid #00a86b;
}

.option.wrong{
  background:#fde2e0;
  border:2px solid #d93025;
}

.feedback{
  display:none;
  margin-top:14px;
  padding:14px;
  border-radius:14px;
  font-size:14px;
  line-height:1.6;
}

.feedback.show{
  display:block;
}

.feedback.correct{
  background:#dff6e9;
  border:1px solid #00a86b;
}

.feedback.wrong{
  background:#fde2e0;
  border:1px solid #d93025;
}

.nav{
  display:flex;
  gap:10px;
  margin-top:16px;
}

.nav button{
  flex:1;
  border:0;
  border-radius:14px;
  padding:13px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
}

.prev{
  background:#dce7ff;
  color:#003b8f;
}

.next{
  background:#00a86b;
  color:white;
}

.footer{
  text-align:center;
  color:white;
  font-size:12px;
  padding:20px 4px 28px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
  <h1>📘 Quiz de Auditoria</h1>
  <p>NBC TA 230 – Documentação de Auditoria</p>
</div>

<div class="score" id="score">
Acertos: 0 | Erros: 0
</div>

<div class="grid" id="grid"></div>

<div class="card">

<div class="meta" id="meta"></div>

<div class="qnum" id="qnum"></div>

<div class="question" id="question"></div>

<div class="options" id="options"></div>

<div class="feedback" id="feedback"></div>

<div class="nav">
  <button class="prev" onclick="prevQuestion()">← Voltar</button>
  <button class="next" onclick="nextQuestion()">Próxima →</button>
</div>

</div>

<div class="footer">
Curso de Contabilidade Professor Moreira
</div>

</div>

<script>

const questions = [

{
meta:"FGV - ACE (TCE RR)/TCE RR/Ciências Atuariais/2025",

html:`
<p>
Sobre a documentação de auditoria, considere as afirmativas:
</p>

<div class="roman">
<b>I.</b> Deve incluir uma estratégia de auditoria e um plano de auditoria.
</div>

<div class="roman">
<b>II.</b> Deve ser suficientemente detalhada para permitir a um auditor experiente entender a natureza, a época, o escopo e os resultados dos procedimentos executados.
</div>

<div class="roman">
<b>III.</b> Deve registrar os procedimentos executados e a evidência obtida e apoiar a comunicação dos resultados da auditoria.
</div>

<p>
Está correto o que se afirma em:
</p>
`,

options:[
"I, II e III.",
"II e III, apenas.",
"I, apenas.",
"I e III, apenas.",
"II, apenas."
],

answer:0,

comment:"Todas estão corretas. A documentação deve registrar planejamento, procedimentos, evidências e conclusões."
}

];

let current = 0;

let userAnswers = Array(questions.length).fill(null);

function renderGrid(){

  const grid = document.getElementById("grid");

  grid.innerHTML = "";

  questions.forEach((q,i)=>{

    const btn = document.createElement("button");

    btn.textContent = i+1;

    if(i === current){
      btn.classList.add("active");
    }

    if(userAnswers[i] !== null){

      if(userAnswers[i] === q.answer){
        btn.classList.add("correct");
      }else{
        btn.classList.add("wrong");
      }

    }

    btn.onclick = ()=>{

      current = i;

      renderQuestion();

    };

    grid.appendChild(btn);

  });

}

function renderQuestion(){

  const q = questions[current];

  document.getElementById("meta").textContent = q.meta;

  document.getElementById("qnum").textContent =
  "Questão " + (current+1);

  document.getElementById("question").innerHTML =
  q.html;

  const optionsDiv = document.getElementById("options");

  optionsDiv.innerHTML = "";

  q.options.forEach((op,i)=>{

    const div = document.createElement("div");

    div.className = "option";

    div.innerHTML =
    "<b>" + String.fromCharCode(97+i) + ")</b> " + op;

    if(userAnswers[current] !== null){

      if(i === q.answer){
        div.classList.add("correct");
      }

      if(i === userAnswers[current] && i !== q.answer){
        div.classList.add("wrong");
      }

    }

    div.onclick = ()=>selectAnswer(i);

    optionsDiv.appendChild(div);

  });

  showFeedback();

  renderGrid();

  updateScore();

}

function selectAnswer(i){

  userAnswers[current] = i;

  renderQuestion();

}

function showFeedback(){

  const fb = document.getElementById("feedback");

  const q = questions[current];

  if(userAnswers[current] === null){

    fb.className = "feedback";

    fb.innerHTML = "";

    return;

  }

  if(userAnswers[current] === q.answer){

    fb.className = "feedback show correct";

    fb.innerHTML =
    "<b>✅ Você acertou!</b><br><br>" + q.comment;

  }else{

    fb.className = "feedback show wrong";

    fb.innerHTML =
    "<b>❌ Você errou.</b><br><br>" +
    "Resposta correta: <b>" +
    String.fromCharCode(97+q.answer) +
    ") " +
    q.options[q.answer] +
    "</b><br><br>" +
    q.comment;

  }

}

function updateScore(){

  let acertos = 0;

  let erros = 0;

  userAnswers.forEach((ans,i)=>{

    if(ans !== null){

      if(ans === questions[i].answer){
        acertos++;
      }else{
        erros++;
      }

    }

  });

  document.getElementById("score").textContent =
  "Acertos: " + acertos + " | Erros: " + erros;

}

function nextQuestion(){

  if(current < questions.length-1){

    current++;

    renderQuestion();

  }

}

function prevQuestion(){

  if(current > 0){

    current--;

    renderQuestion();

  }

}

renderQuestion();

</script>

</body>
</html>
